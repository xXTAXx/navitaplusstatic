<!DOCTYPE html>
<html lang="en">
<style>
  * {
    margin: 0%;
    padding: 0%;
  }


  .navbar {
    position: relative;
    width: 100%;
    height: 70px;
    background-color: ghostwhite;
  }

  .contentnavbar {
    padding: 0px 20px;
    width: 100%;
    height: 100%;
    display: grid;
    gap: 1rem;
    grid-template-columns: 1fr 3fr;

  }

  .leftcontentnavbar,
  .rightcontentnavbar {
    width: 100%;
    height: 100%;
  }

  .leftcontentnavbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .contenedor-in-left {
    display: none;
    gap: .5rem;
  }

  .rightcontentnavbar {
    display: flex;
    justify-content: flex-end;
  }

  .nav-menu {
    list-style: none;
    /* quitar los bullets */
    display: flex;
    /* poner los items en fila */
    gap: 20px;
    /* espacio entre items */
    margin: 0;
    padding: 0;
    align-items: center;
  }

  .nav-menu li a {
    text-decoration: none;
    padding: 10px 15px;
    color: rgb(0, 121, 131);
    border-radius: 5px;
    transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
    font-weight: 500;
    display: inline-block;
  }

  .boton-contactos {
    background-color: #25d365;
  }

  @media (hover: hover) and (pointer: fine) {
    .nav-menu li a:hover {
      transform: scale(1.1);
      color: rgb(3, 150, 163);
    }
  }



  .boton-contactos-sm {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #25d365;
    width: 50px;
    height: 50px;
    border-radius: 5px;
    color: rgb(0, 121, 131);

  }

  .logo-link {
    display: inline-block;
    transition: transform 0.2s ease;
  }

  .logo-link img {
    height: auto;
    width: 145px;
  }

  .logo-link:hover {
    transform: scale(1.1);
    /* o el color del fondo del navbar */
  }


  .boton-expandir {
    width: 70px;
    color: rgb(0, 121, 131);
    height: 50px;
    font-size: large;
    background-color: transparent;
    transition: transform 0.3s ease, background-color 0.3s ease;
    border-radius: 5px;
    border: none;
  }

  .boton-expandir:hover {
    background-color: rgb(0, 121, 131, 0.2);
    transform: scale(1.1);
  }

  @media (max-width: 600px) {
    .navbar {
      height: auto;
      z-index: 2;
    }

    .contentnavbar {
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    .contenedor-in-left {
      display: flex;
    }



    .rightcontentnavbar {
      display: none;
      justify-content: center;
      align-content: center;
      background-color: aliceblue;
      z-index: 2;
    }

    .rightcontentnavbar.show {
      display: flex;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .nav-menu li {
      flex-grow: 1;
      width: 100%;
    }

    .nav-menu li * {
      width: 100%;

    }

    .boton-contactos {
      display: none !important;
    }

  }

  @media (min-width: 601px) {
    .rightcontentnavbar {
      display: flex;
    }
  }

  /* ----------------------------------------------------- */

  .hero-section {
    background-color: hsl(0, 0%, 90%);
    padding-top: 70px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }



  .hero-container {
    width: 100%;
    max-width: 1500px;
    height: 50dvh;
    margin: 10px;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
  }

  .hero-image {
    object-fit: cover;
    object-position: 50% 90%;
    height: 100%;
    width: 100%;
    position: absolute;
  }

  .action-hero {
    position: absolute;
    width: 100%;
    height: 100px;
    bottom: 0px;
    background: rgba(148, 148, 148, 0);
    background: linear-gradient(to top,
        rgba(0, 0, 0, .55),
        rgba(0, 0, 0, 0));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .hero-button {
    width: 160px;
    height: 45px;

    border-radius: 10px;
    border: none;

    font-size: 1rem;
    font-weight: 400;

    cursor: pointer;

    transition:
      transform .2s ease,
      background-color .2s ease,
      color .2s ease,
      border-color .2s ease;
  }

  /* SOLID */
  .hero-button-solid {
    background-color: white;
    color: rgb(0, 121, 131);
  }

  .hero-button-solid:hover {
    transform: scale(1.05);
    background-color: rgb(240, 240, 240);
  }

  /* GHOST */
  .hero-button-ghost {
    background-color: rgba(255, 255, 255, .08);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255, 255, 255, .4);

    color: white;
  }

  .hero-button-ghost:hover {
    transform: scale(1.05);

    background-color: rgba(255, 255, 255, .18);
    border-color: rgba(255, 255, 255, .7);
  }

  .contact-section {
    background-color: hsl(173, 81%, 21%);
    width: 100%;

    display: flex;
    justify-content: center;

    padding: 20px;
  }

  .contact-container {
    width: 100%;
    max-width: 1500px;

    display: grid;
    grid-template-columns: 1fr fr;
    gap: 20px;


  }

  /* CAJAS */
  .l-contact-container,
  .r-contact-container {
    border-radius: 32px;
    overflow: hidden;
  }

  /* IZQUIERDA */
  .l-contact-container {
    background-color: #00000035;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 40px;

    min-height: 100px;
  }

  /* DERECHA */
  .r-contact-container {
    background-color: #e9ecef;

    min-height: 400px;
  }

  /* TEXO */
  .l-contact-container h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    color: #e9ecef;
    line-height: .9;
    text-align: right;
  }

  .r-contact-container {
    background-color: #e9ecef;

    padding: 30px;

    display: flex;
    align-items: center;
  }

  .social-links {
    width: 100%;

    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .social-card {
    background-color: white;

    border-radius: 20px;

    padding: 18px 20px;

    display: flex;
    align-items: center;
    gap: 18px;

    text-decoration: none;

    color: rgb(0, 121, 131);

    transition:
      transform .2s ease,
      background-color .2s ease;
  }

  .social-card:hover {
    transform: translateY(-3px);
    background-color: rgb(245, 245, 245);
  }

  .social-card i {
    font-size: 1.8rem;
  }

  .social-info {
    display: flex;
    flex-direction: column;
  }

  .social-title {
    font-weight: 700;
    font-size: 1rem;
  }

  .social-user {
    opacity: .7;
    font-size: .95rem;
  }

  /* DESKTOP */
  @media (min-width: 600px) {

    .hero-container {
      height: 80dvh;
    }

    .contact-container {
      grid-template-columns: 1fr 1.2fr;
      align-items: stretch;
    }

  }
</style>
